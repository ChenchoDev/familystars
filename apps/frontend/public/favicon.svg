<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0f172a"/>

  <!-- Constellation lines -->
  <line x1="100" y1="50" x2="140" y2="100" stroke="rgba(168,85,247,0.3)" stroke-width="1.5"/>
  <line x1="140" y1="100" x2="100" y2="150" stroke="rgba(168,85,247,0.3)" stroke-width="1.5"/>
  <line x1="100" y1="150" x2="60" y2="100" stroke="rgba(168,85,247,0.3)" stroke-width="1.5"/>
  <line x1="60" y1="100" x2="100" y2="50" stroke="rgba(168,85,247,0.3)" stroke-width="1.5"/>

  <!-- Main star (center) -->
  <circle cx="100" cy="100" r="12" fill="url(#grad1)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="16" fill="none" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>

  <!-- Surrounding stars -->
  <circle cx="100" cy="50" r="5" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="140" cy="100" r="5" fill="#3b82f6" filter="url(#glow)"/>
  <circle cx="100" cy="150" r="5" fill="#10b981" filter="url(#glow)"/>
  <circle cx="60" cy="100" r="5" fill="#f59e0b" filter="url(#glow)"/>

  <!-- Accent dots -->
  <circle cx="130" cy="70" r="2.5" fill="rgba(168,85,247,0.6)"/>
  <circle cx="130" cy="130" r="2.5" fill="rgba(168,85,247,0.6)"/>
  <circle cx="70" cy="70" r="2.5" fill="rgba(168,85,247,0.6)"/>
  <circle cx="70" cy="130" r="2.5" fill="rgba(168,85,247,0.6)"/>
</svg>
